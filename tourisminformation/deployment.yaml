apiVersion: apps/v1
kind: Deployment
metadata:
  name: tourisminformation
  labels:
    app: tourisminformation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tourisminformation
  template:
    metadata:
      labels:
        app: tourisminformation
    spec:
      containers:
        - name: tourisminformation
          image: tourisminformation-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: APP_CORS_ALLOWED_ORIGINS
              value: "http://localhost,http://localhost:80,http://127.0.0.1"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
